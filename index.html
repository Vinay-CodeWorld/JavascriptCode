<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Component</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: grid; 
            place-items: center; 
            min-height: 90vh; 
            background: #f0f2f5; 
            color: #333;
        }
        .user-card { 
            background: #ffffff; 
            border-radius: 12px; 
            box-shadow: 0 6px 18px rgba(0,0,0,0.08); 
            padding: 24px; 
            width: 320px; 
            text-align: center;
            transition: transform 0.2s ease-in-out;
        }
        .user-card:hover {
            transform: translateY(-5px);
        }
        .user-card img { 
            border-radius: 50%; 
            width: 120px; 
            height: 120px; 
            border: 4px solid #f0f2f5;
            margin-bottom: 16px;
        }
        .user-card h2 {
            margin: 0 0 8px 0;
        }
        .user-card p {
            margin: 0 0 20px 0;
            color: #666;
            font-size: 0.95em;
        }
        .user-card button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 8px; 
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .user-card button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <div id="user-profile" class="user-card">
        <h2>Loading...</h2>
        <p>Click the button to fetch a new user.</p>
        <button id="fetch-button">Get New User</button>
    </div>

    <script src="app.js"></script> 
</body>
</html>
